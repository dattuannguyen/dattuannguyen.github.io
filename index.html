<!DOCTYPE html>
<html>
<head>
	<title>Sign up</title>
	<link href="https://fonts.googleapis.com/css?family=Titan+One" rel="stylesheet">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="style3.css">
</head>
<body>
	<header class="startup d-flex ">
		<div class="container my-auto">
			<div class="row">
				<div class="col-lg-12 my-auto">
					<h1 class="text-uppercase text-center faded ">Sign up</h1>
					<p class="text-center">Please fill in this form to create an account.</p>
					<hr>
				</div>
				<div class="col-lg-12">
					<form method="GET" id="id01">
						<label for="Username"><b>Username</b></label>
							<input type="text" name="Username" placeholder="Username" required>

							<label for="Email"><b>Email</b></label>
							<input type="Email" name="Email" placeholder="Email" required>

							<label for="Password"><b>Password</b></label>
							<input type="Password" name="Password" placeholder="Enter Password" required>

							<label for="Password-repeat"><b>Repeat Password</b></label>
							<input type="password" name="Password-repeat" placeholder="Repeat Password" required>
							<label>
		        			<input type="checkbox" checked="checked" name="remember" style="margin-bottom:15px"> Remember me<br>
		        			<input class="btn btn-primary" type="submit" value="Signup" name="Signup" class="button">
		     				 </label>
					</form>
				</div>
			</div>
		</div>
	</header>

</body>
</html>
